<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Bar - Sharp Corners</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Base Styles */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            /* Mimicking the warm, dark gradient from your image */
            background: linear-gradient(to right, #3d2616, #8a5a2b, #3d2616);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 40px;
            overflow: hidden;
        }

        /* Container for the entire bar */
        .player-bar {
            display: flex;
            align-items: center;
            gap: 40px;
            color: white;
            padding: 10px;
        }

        /* Playback Controls (Left) */
        .main-controls {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        .control-btn:active {
            transform: scale(0.9);
        }

        /* Central Song Widget */
        .song-widget {
            background: rgba(20, 20, 20, 0.7); /* Dark semi-transparent */
            backdrop-filter: blur(15px); /* Frosted glass effect */
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            width: 380px;
            height: 60px;
            padding: 0 15px 0 0;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* Sharp corners - no border-radius */
        }

        .album-art {
            width: 60px;
            height: 60px;
            object-fit: cover;
            margin-right: 15px;
            /* Sharp corners */
        }

        .info-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .song-title {
            font-size: 15px;
            font-weight: 500;
            margin: 0;
        }

        .artist-name {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin: 0;
        }

        .widget-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .icon-btn-small {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.8;
        }

        /* Progress Bar at the bottom of the widget */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
        }

        .progress-fill {
            width: 35%; /* Hardcoded progress */
            height: 100%;
            background: #ffffff;
        }

        /* Utility Controls (Right) */
        .utility-controls {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .utility-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.85);
            font-size: 22px;
            cursor: pointer;
        }

        .utility-btn:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="player-bar">
        
        <div class="main-controls">
            <button class="control-btn"><i class="ph-fill ph-rewind"></i></button>
            <button class="control-btn" id="playPauseBtn"><i class="ph-fill ph-pause" id="playPauseIcon"></i></button>
            <button class="control-btn"><i class="ph-fill ph-fast-forward"></i></button>
        </div>

        <div class="song-widget">
            <img src="https://upload.wikimedia.org/wikipedia/en/a/a3/The_Weeknd_-_Blinding_Lights.png" alt="Album Art" class="album-art">
            
            <div class="info-area">
                <p class="song-title">Blinding Lights</p>
                <p class="artist-name">The Weeknd</p>
            </div>

            <div class="widget-actions">
                <button class="icon-btn-small"><i class="ph ph-airplay"></i></button>
                <button class="icon-btn-small"><i class="ph ph-dots-three-bold"></i></button>
            </div>

            <div class="progress-container">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="utility-controls">
            <button class="utility-btn"><i class="ph ph-quotes"></i></button>
            <button class="utility-btn"><i class="ph ph-list-bullets"></i></button>
            <button class="utility-btn"><i class="ph-fill ph-speaker-high"></i></button>
        </div>

    </div>

    <script>
        const playBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playPauseIcon');
        let isPlaying = true; // Based on the screenshot showing 'pause'

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                playIcon.classList.replace('ph-pause', 'ph-play');
            } else {
                playIcon.classList.replace('ph-play', 'ph-pause');
            }
            isPlaying = !isPlaying;
        });
    </script>
</body>
</html>
